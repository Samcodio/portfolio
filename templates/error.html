{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nosike Samuel Ebubechukwu — Django/C# Developer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #16161f;
    --card: #1a1a26;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0f5;
    --muted: #8888a0;
    --accent1: #7c6bff;
    --accent2: #00e5b0;
    --accent3: #ff6b9d;
    --accent4: #ffa955;
    --glow1: rgba(124,107,255,0.15);
    --glow2: rgba(0,229,176,0.12);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 16px;
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* ---- NOISE TEXTURE ---- */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* ---- GRID BACKGROUND ---- */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,107,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,107,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* ---- NAV ---- */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 1.2rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.2rem;
    color: var(--text);
    text-decoration: none;
    letter-spacing: -0.02em;
  }

  .nav-logo span { color: var(--accent1); }

  .nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
  }

  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    transition: color 0.2s;
    position: relative;
  }

  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0; right: 0;
    height: 1px;
    background: var(--accent1);
    transform: scaleX(0);
    transition: transform 0.2s;
    transform-origin: left;
  }

  .nav-links a:hover { color: var(--text); }
  .nav-links a:hover::after { transform: scaleX(1); }

  .nav-cta {
    background: var(--accent1);
    color: #fff !important;
    padding: 0.5rem 1.2rem;
    border-radius: 6px;
    font-weight: 600 !important;
    transition: opacity 0.2s !important;
  }

  .nav-cta:hover { opacity: 0.85; }
  .nav-cta::after { display: none !important; }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px;
  }

  .hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: var(--text);
    border-radius: 2px;
    transition: all 0.3s;
  }

  /* ---- HERO ---- */
  #hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding: 8rem 2rem 4rem;
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
  }

  .hero-inner {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem;
    align-items: center;
    width: 100%;
  }

  .hero-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(124,107,255,0.1);
    border: 1px solid rgba(124,107,255,0.25);
    color: var(--accent1);
    font-size: 0.8rem;
    font-family: 'DM Mono', monospace;
    padding: 0.4rem 1rem;
    border-radius: 100px;
    margin-bottom: 1.5rem;
    letter-spacing: 0.05em;
  }

  .hero-tag::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .hero-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.5rem, 5vw, 4rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.03em;
    margin-bottom: 1.5rem;
  }

  .hero-title .line2 {
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-desc {
    color: var(--muted);
    font-size: 1.05rem;
    line-height: 1.8;
    margin-bottom: 2.5rem;
    max-width: 480px;
  }

  .hero-desc strong { color: var(--text); font-weight: 500; }

  .hero-btns {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .btn-primary {
    background: var(--accent1);
    color: #fff;
    padding: 0.75rem 1.8rem;
    border-radius: 8px;
    font-weight: 600;
    font-size: 0.95rem;
    text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 24px rgba(124,107,255,0.3);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 32px rgba(124,107,255,0.5);
  }

  .btn-secondary {
    background: transparent;
    color: var(--text);
    padding: 0.75rem 1.8rem;
    border-radius: 8px;
    font-weight: 500;
    font-size: 0.95rem;
    text-decoration: none;
    border: 1px solid var(--border2);
    transition: border-color 0.2s, background 0.2s;
  }

  .btn-secondary:hover {
    border-color: var(--accent1);
    background: rgba(124,107,255,0.08);
  }

  /* hero visual */
  .hero-visual {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .avatar-wrap {
    position: relative;
    width: 280px;
    height: 280px;
  }

  .avatar-ring {
    position: absolute;
    inset: -16px;
    border-radius: 50%;
    border: 1px solid rgba(124,107,255,0.2);
    animation: spin 20s linear infinite;
  }

  .avatar-ring::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent1);
    box-shadow: 0 0 12px var(--accent1);
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .avatar-img {
    width: 280px;
    height: 280px;
    border-radius: 50%;
    object-fit: cover;
    background: var(--card);
    border: 2px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 5rem;
    font-weight: 800;
    color: var(--accent1);
    overflow: hidden;
  }

  .avatar-initials {
    width: 280px;
    height: 280px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(124,107,255,0.15), rgba(0,229,176,0.1));
    border: 2px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 5rem;
    font-weight: 800;
    color: var(--accent1);
  }

  .floating-badge {
    position: absolute;
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 0.6rem 1rem;
    font-size: 0.8rem;
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
    animation: float 4s ease-in-out infinite;
  }

  .badge-1 {
    top: 10px; right: -30px;
    color: var(--accent2);
    animation-delay: 0s;
  }

  .badge-2 {
    bottom: 40px; left: -40px;
    color: var(--accent4);
    animation-delay: 1.5s;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  /* ---- SECTION SHARED ---- */
  section {
    position: relative;
    z-index: 1;
    padding: 6rem 2rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent1);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    max-width: 40px;
    height: 1px;
    background: var(--accent1);
    opacity: 0.5;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.8rem, 3vw, 2.5rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 1rem;
  }

  .section-sub {
    color: var(--muted);
    max-width: 600px;
    margin-bottom: 3rem;
    font-size: 1.05rem;
  }

  /* ---- ABOUT ---- */
  .about-grid {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 4rem;
    align-items: start;
  }

  .about-text p {
    color: var(--muted);
    margin-bottom: 1.2rem;
    font-size: 1.05rem;
    line-height: 1.8;
  }

  .about-text p strong { color: var(--text); font-weight: 500; }

  .about-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-top: 2rem;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem;
    transition: border-color 0.2s;
  }

  .stat-card:hover { border-color: var(--accent1); }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    color: var(--accent1);
    line-height: 1;
    margin-bottom: 0.25rem;
  }

  .stat-label {
    font-size: 0.8rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .about-aside {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .aside-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    transition: border-color 0.2s, transform 0.2s;
  }

  .aside-card:hover {
    border-color: var(--border2);
    transform: translateX(4px);
  }

  .aside-card-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    margin-bottom: 0.75rem;
  }

  .aside-card h4 {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    margin-bottom: 0.3rem;
  }

  .aside-card p {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.6;
  }

  /* ---- PROJECTS ---- */
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1.5rem;
  }

  .project-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.8rem;
    transition: border-color 0.25s, transform 0.25s;
    position: relative;
    overflow: hidden;
  }

  .project-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent1), var(--accent2));
    transform: scaleX(0);
    transition: transform 0.3s;
    transform-origin: left;
  }

  .project-card:hover {
    border-color: var(--border2);
    transform: translateY(-4px);
  }

  .project-card:hover::before { transform: scaleX(1); }

  .project-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1rem;
  }

  .project-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
  }

  .project-links { display: flex; gap: 8px; }

  .project-link {
    width: 32px; height: 32px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
    color: var(--muted);
    font-size: 0.85rem;
    transition: color 0.2s, border-color 0.2s;
  }

  .project-link:hover { color: var(--text); border-color: var(--accent1); }

  .project-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    margin-bottom: 0.5rem;
    letter-spacing: -0.01em;
  }

  .project-desc {
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.7;
    margin-bottom: 1.2rem;
  }

  .project-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 0.3rem 0.7rem;
    border-radius: 100px;
    border: 1px solid;
    letter-spacing: 0.02em;
  }

  .tag-purple { color: var(--accent1); border-color: rgba(124,107,255,0.3); background: rgba(124,107,255,0.08); }
  .tag-teal   { color: var(--accent2); border-color: rgba(0,229,176,0.3);   background: rgba(0,229,176,0.08); }
  .tag-pink   { color: var(--accent3); border-color: rgba(255,107,157,0.3); background: rgba(255,107,157,0.08); }
  .tag-amber  { color: var(--accent4); border-color: rgba(255,169,85,0.3);  background: rgba(255,169,85,0.08); }

  /* ---- TECH STACK ---- */
  #stack { background: var(--bg2); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  #stack > .stack-inner { max-width: 1200px; margin: 0 auto; padding: 6rem 2rem; }

  .stack-categories {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.5rem;
  }

  .stack-cat {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    transition: border-color 0.2s;
  }

  .stack-cat:hover { border-color: var(--border2); }

  .stack-cat-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .stack-cat-title::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
  }

  .cat-backend .stack-cat-title::before  { background: var(--accent1); }
  .cat-frontend .stack-cat-title::before { background: var(--accent2); }
  .cat-db .stack-cat-title::before       { background: var(--accent4); }
  .cat-tools .stack-cat-title::before    { background: var(--accent3); }

  .stack-items {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .stack-item {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.4rem 0.75rem;
    font-size: 0.85rem;
    font-weight: 500;
    transition: border-color 0.2s, transform 0.2s;
    cursor: default;
  }

  .stack-item:hover {
    border-color: var(--border2);
    transform: translateY(-2px);
  }

  .stack-item-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ---- CONTACT ---- */
  .contact-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem;
    align-items: start;
  }

  .contact-info { }

  .contact-channels {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    margin-top: 2rem;
  }

  .contact-channel {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.2rem;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.2s, transform 0.2s;
  }

  .contact-channel:hover {
    border-color: var(--accent1);
    transform: translateX(4px);
  }

  .channel-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  .channel-label {
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 2px;
  }

  .channel-value {
    font-size: 0.9rem;
    font-weight: 500;
  }

  .contact-form {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
  }

  .form-group {
    margin-bottom: 1.2rem;
  }

  .form-label {
    display: block;
    font-size: 0.8rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    margin-bottom: 0.5rem;
    letter-spacing: 0.05em;
  }

  .form-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    color: var(--text);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus { border-color: var(--accent1); }
  .form-input::placeholder { color: var(--muted); }

  textarea.form-input { resize: vertical; min-height: 120px; }

  .form-submit {
    width: 100%;
    background: var(--accent1);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.85rem;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
    box-shadow: 0 0 24px rgba(124,107,255,0.3);
  }

  .form-submit:hover { opacity: 0.9; transform: translateY(-1px); }

  /* ---- FOOTER ---- */
  footer {
    position: relative;
    z-index: 1;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 2rem;
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    font-family: 'DM Mono', monospace;
  }

  footer a { color: var(--accent1); text-decoration: none; }

  /* ---- DIVIDER ---- */
  .section-divider {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 2rem;
  }

  .section-divider hr {
    border: none;
    border-top: 1px solid var(--border);
  }

  /* ---- FADE IN ANIM ---- */
  .fade-up {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .fade-up.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 900px) {
    .hero-inner { grid-template-columns: 1fr; text-align: center; }
    .hero-visual { display: none; }
    .hero-desc { max-width: 100%; }
    .hero-btns { justify-content: center; }
    .about-grid { grid-template-columns: 1fr; }
    .contact-wrap { grid-template-columns: 1fr; }
  }

  @media (max-width: 680px) {
    nav { padding: 1rem 1.2rem; }
    .nav-links { display: none; flex-direction: column; position: absolute; top: 100%; left: 0; right: 0; background: var(--bg2); border-bottom: 1px solid var(--border); padding: 1rem 1.2rem; gap: 1rem; }
    .nav-links.open { display: flex; }
    .hamburger { display: flex; }
    section { padding: 4rem 1.2rem; }
    .projects-grid { grid-template-columns: 1fr; }
    .stack-categories { grid-template-columns: 1fr; }
    .about-stats { grid-template-columns: 1fr 1fr; }
  }


  .error-container {
    display: flex;
    justify-content: center; /* horizontal centering */
    align-items: center;     /* vertical centering */
    height: calc(100vh - 60px); /* full viewport minus footer height */
    width: 100%;
    text-align: center;
  }

  .error-container img {
    max-width: 90%;
    max-height: 100%;
    height: auto;
    width: auto;
  }
</style>
</head>
<body>

<div class="error-container">
  <img src="{% static 'images/404.png' %}" alt="404 Error">
</div>

<footer>
  <p>Nosike Samuel Ebubechukwu · Backend Developer · Nigeria</p>
</footer>

<script>
  // hamburger
  const hamburger = document.getElementById('hamburger');
  const navLinks = document.getElementById('navLinks');
  hamburger.addEventListener('click', () => navLinks.classList.toggle('open'));
  navLinks.querySelectorAll('a').forEach(a => a.addEventListener('click', () => navLinks.classList.remove('open')));

  // fade up on scroll
  const fadeEls = document.querySelectorAll('.fade-up');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
  }, { threshold: 0.12 });
  fadeEls.forEach(el => observer.observe(el));

  // contact form placeholder
  document.querySelector('.form-submit').addEventListener('click', () => {
    alert('Hook this up to your Django view!');
  });
</script>
</body>
</html>
